<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="라디오 스트리밍">
  <meta name="theme-color" content="#090910">
  <title>라이브 라디오 스트리밍</title>
  <style>
    :root {
      --bg:       #090910;
      --surface:  #10101c;
      --card:     #161624;
      --card-on:  #1e1e32;
      --border:   rgba(255,255,255,.07);
      --text:     #f0f0f4;
      --sub:      #9090b0;
      --muted:    #50506a;
      --green:    #4ade80;
      --green-d:  rgba(74,222,128,.13);
      --amber:    #fbbf24;
      --red:      #f87171;
      --r:        14px;
      --sb: env(safe-area-inset-bottom, 0px);
      --st: env(safe-area-inset-top,    0px);
      /* genre palette */
      --classic-c: #c9993a; --classic-d: rgba(201,153,58,.16);
      --jazz-c:    #a78bfa; --jazz-d:    rgba(167,139,250,.14);
      --pop-c:     #f472b6; --pop-d:     rgba(244,114,182,.14);
      --easy-c:    #2dd4bf; --easy-d:    rgba(45,212,191,.13);
      --news-c:    #fb923c; --news-d:    rgba(251,146,60,.13);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(96px + var(--sb));
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; gap: 13px;
      padding: calc(var(--st) + 14px) 18px 13px;
      background: rgba(9,9,16,.88);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .h-logo {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #1e1608, #14143a);
      border: 1px solid rgba(201,153,58,.3);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: 11px; color: var(--sub); margin-top: 1px; }

    /* ── NAV BAR ── */
    #nav-bar {
      position: sticky; top: 0; z-index: 25;
      display: flex; gap: 6px;
      padding: 8px 14px;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
      background: rgba(7,7,14,.92);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }
    #nav-bar::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 13px; border-radius: 99px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--sub);
      transition: background .15s, color .15s, border-color .15s, transform .1s;
      -webkit-user-select: none; user-select: none; -webkit-appearance: none; appearance: none;
    }
    .pill:active { transform: scale(.92); }
    .pill.a-classic { background: var(--classic-d); color: var(--classic-c); border-color: rgba(201,153,58,.4); }
    .pill.a-jazz    { background: var(--jazz-d);    color: var(--jazz-c);    border-color: rgba(167,139,250,.4); }
    .pill.a-pop     { background: var(--pop-d);     color: var(--pop-c);     border-color: rgba(244,114,182,.4); }
    .pill.a-easy    { background: var(--easy-d);    color: var(--easy-c);    border-color: rgba(45,212,191,.38); }
    .pill.a-news    { background: var(--news-d);    color: var(--news-c);    border-color: rgba(251,146,60,.38); }

    /* ── SECTION ── */
    .sec { margin: 20px 0 0; scroll-margin-top: 120px; }
    .sec-label {
      font-size: 11px; font-weight: 600; letter-spacing: .9px;
      text-transform: uppercase; color: var(--muted);
      padding: 0 18px 8px;
      display: flex; align-items: center; gap: 7px;
    }
    .sec-label span {
      font-size: 10px; font-weight: 600; padding: 1px 7px;
      border-radius: 99px; background: var(--surface); color: var(--muted);
      letter-spacing: 0;
    }

    /* ── STATION LIST ── */
    .slist {
      margin: 0 13px;
      border-radius: var(--r); overflow: hidden;
      display: flex; flex-direction: column; gap: 1px;
      background: var(--border);
    }

    .st {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--card);
      cursor: pointer; transition: background .12s;
      -webkit-user-select: none; user-select: none;
    }
    .st:active  { background: var(--card-on); }
    .st.playing { background: linear-gradient(108deg,#111e12,#161624); }
    .st.loading { background: linear-gradient(108deg,#1c1a0e,#161624); }
    .st.errored { background: linear-gradient(108deg,#1e1212,#161624); }

    /* flag bubble */
    .st-flag {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: var(--surface); display: flex; align-items: center;
      justify-content: center; font-size: 24px;
      border: 1.5px solid transparent;
      transition: border-color .2s, box-shadow .2s;
    }
    .st.playing .st-flag { border-color: var(--green); box-shadow: 0 0 10px var(--green-d); }
    .st.loading .st-flag { border-color: var(--amber); box-shadow: 0 0 10px rgba(251,191,36,.13); }
    .st.errored .st-flag { border-color: var(--red);   box-shadow: 0 0 10px rgba(248,113,113,.1); }

    /* info */
    .st-info { flex: 1; min-width: 0; }
    .st-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .st-sub  { font-size: 11px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .st-tags { display: flex; gap: 5px; margin-top: 5px; overflow: hidden; }
    .tag {
      font-size: 10px; font-weight: 500; padding: 2px 7px;
      border-radius: 99px; background: var(--surface); color: var(--sub);
      white-space: nowrap; transition: background .2s, color .2s;
    }
    .st.playing .tag { background: var(--green-d);               color: var(--green); }
    .st.loading .tag { background: rgba(251,191,36,.11);          color: var(--amber); }
    .st.errored .tag { background: rgba(248,113,113,.09);         color: var(--red); }
    .tag-warn { color: var(--amber) !important; background: transparent !important; padding-left: 0 !important; }

    /* right */
    .st-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .q-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }
    .q-badge.classic { color: var(--classic-c); background: var(--classic-d); }
    .q-badge.jazz    { color: var(--jazz-c);    background: var(--jazz-d); }
    .q-badge.pop     { color: var(--pop-c);     background: var(--pop-d); }
    .q-badge.easy    { color: var(--easy-c);    background: var(--easy-d); }
    .q-badge.news    { color: var(--news-c);    background: var(--news-d); }

    .play-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
      transition: background .15s;
    }
    .st.playing .play-btn { background: var(--green);  color: #000; }
    .st.loading .play-btn { background: var(--amber);  color: #000; }
    .st.errored .play-btn { background: var(--red);    color: #fff; }

    /* ── EQ / SPINNER ── */
    .eq { display: flex; align-items: flex-end; gap: 2px; height: 13px; }
    .eq i { display: block; width: 3px; border-radius: 1.5px; background: currentColor;
             animation: eq .75s ease-in-out infinite alternate; }
    .eq i:nth-child(1){ height:35%; animation-delay:0s; }
    .eq i:nth-child(2){ height:90%; animation-delay:.18s; }
    .eq i:nth-child(3){ height:55%; animation-delay:.32s; }
    .eq i:nth-child(4){ height:100%;animation-delay:.08s; }
    @keyframes eq { from{transform:scaleY(.25)} to{transform:scaleY(1)} }

    .spin {
      width:13px; height:13px; border-radius:50%;
      border:2px solid transparent; border-top-color:currentColor;
      animation:spin .7s linear infinite; flex-shrink:0;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── PLAYER BAR ── */
    #pbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      display: flex; align-items: center; gap: 11px;
      padding: 11px 17px calc(11px + var(--sb));
      background: rgba(10,10,20,.95);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-top: 1px solid var(--border);
      transform: translateY(110%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    #pbar.show { transform: translateY(0); }

    .pb-art {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: var(--surface); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--green); box-shadow: 0 0 12px var(--green-d);
    }
    .pb-info { flex: 1; min-width: 0; }
    .pb-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pb-sub  { font-size: 11px; color: var(--sub); margin-top: 1px; }
    .pb-st   { font-size: 11px; margin-top: 3px; display: flex; align-items: center; gap: 5px; min-height: 13px; }
    .pb-st.ok   { color: var(--green); }
    .pb-st.buf  { color: var(--amber); }
    .pb-st.err  { color: var(--red); }

    .pb-ctrls { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .pb-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      background: var(--surface); color: var(--text);
      transition: background .15s, transform .1s; -webkit-appearance: none; appearance: none;
    }
    .pb-btn:active { transform: scale(.91); }
    .pb-btn.play { background: var(--green); color: #000; width: 48px; height: 48px; font-size: 21px; }

    /* ── FOOTER TIP ── */
    .tip {
      margin: 22px 13px 0;
      padding: 13px 15px; border-radius: var(--r);
      background: var(--card); border-left: 3px solid var(--classic-c);
    }
    .tip h3 { font-size: 11px; font-weight: 700; color: var(--classic-c); margin-bottom: 5px; }
    .tip p  { font-size: 11px; color: var(--sub); line-height: 1.7; }
  </style>
</head>
<body>

<header>
  <div class="h-logo">🎙</div>
  <div>
    <h1>라이브 라디오</h1>
    <p>실시간 스트리밍 · 화면 꺼짐 후에도 재생</p>
  </div>
</header>

<nav id="nav-bar">
  <button class="pill" data-sec="sec-classic" data-cat="classic">🎼 클래식</button>
  <button class="pill" data-sec="sec-jazz"    data-cat="jazz">🎷 재즈</button>
  <button class="pill" data-sec="sec-pop"     data-cat="pop">🎵 팝</button>
  <button class="pill" data-sec="sec-easy"    data-cat="easy">🎹 경음악</button>
  <button class="pill" data-sec="sec-news"    data-cat="news">📈 경제뉴스</button>
</nav>

<div class="sec" id="sec-classic">
  <div class="sec-label">🎼 클래식 <span id="cnt-classic"></span></div>
  <div class="slist" id="list-classic"></div>
</div>
<div class="sec" id="sec-jazz">
  <div class="sec-label">🎷 재즈 <span id="cnt-jazz"></span></div>
  <div class="slist" id="list-jazz"></div>
</div>
<div class="sec" id="sec-pop">
  <div class="sec-label">🎵 팝 <span id="cnt-pop"></span></div>
  <div class="slist" id="list-pop"></div>
</div>
<div class="sec" id="sec-easy">
  <div class="sec-label">🎹 경음악 <span id="cnt-easy"></span></div>
  <div class="slist" id="list-easy"></div>
</div>
<div class="sec" id="sec-news">
  <div class="sec-label">📈 경제뉴스 <span id="cnt-news"></span></div>
  <div class="slist" id="list-news"></div>
</div>

<div class="tip">
  <h3>💡 이용 안내</h3>
  <p>채널을 탭하면 스트리밍 시작 · 화면을 꺼도 계속 재생됩니다.<br>
     잠금 화면 · 제어 센터에서 재생 / 일시정지를 제어할 수 있습니다.<br>
     📌 공유 → 홈 화면에 추가하면 앱처럼 사용하며 백그라운드 재생이 더욱 안정적입니다.</p>
</div>

<!-- ── PLAYER BAR ── -->
<div id="pbar">
  <div class="pb-art" id="pb-art">🎵</div>
  <div class="pb-info">
    <div class="pb-name" id="pb-name">—</div>
    <div class="pb-sub"  id="pb-sub"></div>
    <div class="pb-st"   id="pb-st"></div>
  </div>
  <div class="pb-ctrls">
    <button class="pb-btn play" id="btn-pp"   onclick="togglePlay()">⏸</button>
    <button class="pb-btn"      id="btn-stop" onclick="stopAll()">⏹</button>
  </div>
</div>

<audio id="audio" playsinline preload="none"></audio>

<script>

];

const GROUPS = ['classic','jazz','pop','easy','news'];
const CAT_ACT = { classic:'a-classic', jazz:'a-jazz', pop:'a-pop', easy:'a-easy', news:'a-news' };

/* ── State ────────────────────────────────────────────────── */
const audio = document.getElementById('audio');
let currentId = null;

/* ── Icon snippets ─────────────────────────────────────────── */
const EQ   = `<div class="eq"><i></i><i></i><i></i><i></i></div>`;
const SPIN  = `<div class="spin"></div>`;

/* ── Render ────────────────────────────────────────────────── */
function renderAll() {
  GROUPS.forEach(g => {
    const list = document.getElementById('list-' + g);
    const cnt  = document.getElementById('cnt-' + g);
    const rows = STREAMS.filter(s => s.group === g);
    cnt.textContent = rows.length + '개';
    rows.forEach(s => {
      const el = document.createElement('div');
      el.className = 'st';
      el.id = 'st-' + s.id;
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', s.name + ' 재생');
      el.onclick   = () => play(s);
      el.onkeydown = e => (e.key==='Enter'||e.key===' ') && play(s);
      el.innerHTML =
        `<div class="st-flag">${s.flag}</div>` +
        `<div class="st-info">` +
          `<div class="st-name">${s.name}</div>` +
          `<div class="st-sub">${s.sub}</div>` +
          `<div class="st-tags">` +
            s.tags.map(t=>`<span class="tag">${t}</span>`).join('') +
          `</div>` +
        `</div>` +
        `<div class="st-right">` +
          `<span class="q-badge ${g}">${s.q}</span>` +
          `<div class="play-btn" id="pb-${s.id}">▶</div>` +
        `</div>`;
      list.appendChild(el);
    });
  });
}

/* ── Station state helpers ─────────────────────────────────── */
function setStCls(id, cls, icon) {
  const el = document.getElementById('st-' + id);
  const pb = document.getElementById('pb-' + id);
  if (!el || !pb) return;
  el.className = 'st' + (cls ? ' ' + cls : '');
  pb.innerHTML  = icon;
}

/* ── Play ──────────────────────────────────────────────────── */
function play(s) {
  if (currentId === s.id) { togglePlay(); return; }
  if (currentId) setStCls(currentId, '', '▶');

  currentId = s.id;
  setStCls(s.id, 'loading', SPIN);

  const bar = document.getElementById('pbar');
  document.getElementById('pb-art').textContent  = s.flag;
  document.getElementById('pb-name').textContent = s.name;
  document.getElementById('pb-sub').textContent  = s.sub;
  setStatus('buf', '⏳ 연결 중…');
  document.getElementById('btn-pp').textContent  = '⏸';
  bar.classList.add('show');

  audio.src = s.url;
  audio.load();
  audio.play().catch(() => {
    setStatus('err', '❌ 재생 실패');
    setStCls(s.id, 'errored', '✕');
  });

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.name, artist: s.sub, album: '라이브 라디오',
      artwork: makeArt(s.flag)
    });
    navigator.mediaSession.setActionHandler('play',        () => audio.play());
    navigator.mediaSession.setActionHandler('pause',       () => audio.pause());
    navigator.mediaSession.setActionHandler('stop',        stopAll);
    navigator.mediaSession.setActionHandler('nexttrack',   nextStation);
    navigator.mediaSession.setActionHandler('seekbackward', null);
    navigator.mediaSession.setActionHandler('seekforward',  null);
  }
}

function togglePlay() {
  if (!currentId) return;
  if (audio.paused) {
    audio.play();
    document.getElementById('btn-pp').textContent = '⏸';
  } else {
    audio.pause();
    document.getElementById('btn-pp').textContent = '▶';
    setStatus('', '⏸ 일시정지');
    setStCls(currentId, '', '▶');
  }
}

function stopAll() {
  if (currentId) { setStCls(currentId, '', '▶'); currentId = null; }
  audio.pause(); audio.src = '';
  document.getElementById('pbar').classList.remove('show');
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
}

function nextStation() {
  const i = STREAMS.findIndex(s => s.id === currentId);
  play(STREAMS[(i + 1) % STREAMS.length]);
}

/* ── Player bar status ─────────────────────────────────────── */
function setStatus(cls, text) {
  const el = document.getElementById('pb-st');
  el.className = 'pb-st' + (cls ? ' ' + cls : '');
  if (cls === 'ok')  el.innerHTML = EQ + ' 재생 중';
  else if (cls === 'buf') el.innerHTML = SPIN + ' ' + (text || '버퍼링…');
  else el.textContent = text || '';
}

/* ── Audio events ──────────────────────────────────────────── */
audio.addEventListener('playing', () => {
  setStatus('ok');
  document.getElementById('btn-pp').textContent = '⏸';
  if (currentId) setStCls(currentId, 'playing', EQ);
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
});
audio.addEventListener('waiting', () => {
  setStatus('buf', '⏳ 버퍼링…');
  if (currentId) setStCls(currentId, 'loading', SPIN);
});
audio.addEventListener('stalled', () => {
  setStatus('buf', '⏳ 연결 중…');
  if (currentId) setStCls(currentId, 'loading', SPIN);
});
audio.addEventListener('pause', () => {
  document.getElementById('btn-pp').textContent = '▶';
  if (currentId) setStCls(currentId, '', '▶');
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
});
audio.addEventListener('error', () => {
  const MSG = ['','미지원 형식','네트워크 오류','디코드 오류','재생 불가'];
  const c = audio.error ? audio.error.code : 0;
  setStatus('err', '❌ ' + (MSG[c] || '재생 오류'));
  document.getElementById('btn-pp').textContent = '▶';
  if (currentId) setStCls(currentId, 'errored', '✕');
});

/* ── Canvas artwork ────────────────────────────────────────── */
function makeArt(flag) {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,256,256);
    g.addColorStop(0,'#1a1a2e'); g.addColorStop(1,'#0a0a14');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(0,0,256,256,36); ctx.fill();
    ctx.font = '108px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(flag, 128, 132);
    return [{ src: c.toDataURL('image/png'), sizes:'256x256', type:'image/png' }];
  } catch(e) { return []; }
}

/* ── Nav bar ───────────────────────────────────────────────── */
(function initNav() {
  const header = document.querySelector('header');
  const nav    = document.getElementById('nav-bar');
  const pills  = [...nav.querySelectorAll('.pill')];

  function reposition() {
    const h = header.offsetHeight;
    nav.style.top = h + 'px';
    const off = h + nav.offsetHeight + 8;
    document.querySelectorAll('.sec').forEach(s => s.style.scrollMarginTop = off + 'px');
  }
  reposition();
  window.addEventListener('resize', reposition);

  pills.forEach(p => p.addEventListener('click', () => {
    document.getElementById(p.dataset.sec)?.scrollIntoView({ behavior:'smooth', block:'start' });
  }));

  let active = null;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) active = e.target.id; });
    const pill = pills.find(p => p.dataset.sec === active);
    if (!pill) return;
    pills.forEach(p => p.classList.remove(...Object.values(CAT_ACT)));
    pill.classList.add(CAT_ACT[pill.dataset.cat] || '');
    pill.scrollIntoView({ behavior:'smooth', inline:'nearest', block:'nearest' });
  }, { rootMargin:'-10% 0px -80% 0px', threshold:0 });

  document.querySelectorAll('.sec').forEach(s => obs.observe(s));
  pills[0].classList.add(CAT_ACT[pills[0].dataset.cat]);
})();

/* ── Boot ──────────────────────────────────────────────────── */
renderAll();
</script>
